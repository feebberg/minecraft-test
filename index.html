<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minecraft Launcher</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      background: #222;
      color: #eee;
      border: 2px solid #444;
      padding: 12px 25px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    button:hover {
      background: #333;
      border-color: #666;
    }
  </style>
</head>
<body>

  <h1>Minecraft Web Launcher</h1>

  <button onclick="window.location.href='1.8.html'">
    Launch Minecraft 1.8
  </button>

  <button onclick="window.location.href='eaglercraft-1.12.html'">
    Launch Minecraft 1.12
  </button>

</body>
</html>
